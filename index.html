    <style>
        :root { 
            --primary: #6FAF8F; --gold: #C8A96A; --dark: #000000; 
            --bg: #FDFCFB; --text: #1A2E24; --card: #ffffff; --border: rgba(0,0,0,0.05);
        }
        .dark-mode { --bg: #121212; --text: #f1f1f1; --card: #1e1e1e; --border: #333333; --dark: #000000; }
        
        body { font-family: 'Cairo', 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }

        /* ثبات القائمة ومنع الاهتزاز */
        .nav-glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--border);
            height: 80px;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
        }
        .dark-mode .nav-glass { background: rgba(18, 18, 18, 0.9); }

        .btn-lang-toggle {
            background-color: #000000; color: white;
            padding: 8px 18px; border-radius: 9999px;
            font-weight: 700; font-size: 14px; transition: 0.3s;
        }
        .btn-lang-toggle:hover { background-color: var(--primary); }

        .category-badge {
            position: absolute; top: 15px; right: 15px;
            background-color: #ff0000; color: white;
            padding: 4px 12px; border-radius: 50px;
            font-weight: 800; font-size: 10px; z-index: 20; text-transform: uppercase;
        }
        [dir="ltr"] .category-badge { right: auto; left: 15px; }

        .product-card { transition: 0.4s ease; border: 1px solid var(--border); background: var(--card); border-radius: 2rem; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* الأزرار سوداء ملكية تتحول للأخضر */
        .btn-order-master { 
            background-color: #000000 !important; color: #ffffff !important; 
            width: 100%; padding: 14px; border-radius: 12px; 
            font-weight: 700; font-size: 13px; transition: 0.3s; border: none;
        }
        .btn-order-master:hover { background-color: #6FAF8F !important; }

        .cart-sidebar { position: fixed; left: -100%; top: 0; width: 350px; height: 100%; background: var(--card); z-index: 2000; transition: 0.5s; box-shadow: 10px 0 30px rgba(0,0,0,0.2); }
        [dir="ltr"] .cart-sidebar { left: auto; right: -100%; }
        .cart-sidebar.open { left: 0; }
        [dir="ltr"].cart-sidebar.open { right: 0; }

        .img-container { height: 260px; display: flex; align-items: center; justify-content: center; padding: 20px; background: white; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .dark-mode #navbar img { filter: brightness(0) invert(1); }
        .float-whatsapp { position: fixed; bottom: 30px; right: 30px; z-index: 1500; }
    </style>

        let lang = 'ar'; let cart = []; let isDark = false;

        function tryImage(imgElement, baseName) {
            const exts = ['.png', '.jpg', '.jpeg', '.JPG', '.PNG']; let index = 0;
            imgElement.onerror = function() {
                if (index < exts.length) { this.src = baseName + exts[index]; index++; }
                else { this.src = 'https://via.placeholder.com/400x500?text=No+Image'; this.onerror = null; }
            };
            imgElement.src = baseName + exts[0];
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid'); grid.innerHTML = '';
            products.forEach(p => {
                const label = lang === 'ar' ? 'أضف للحقيبة' : 'Add to Bag';
                const card = document.createElement('div');
                card.className = "product-card p-5 relative text-center";
                card.innerHTML = `<div class="category-badge">${lang === 'ar' ? p.tagAr : p.tagEn}</div><div class="img-container mb-4"><img class="prod-img"></div><h3 class="text-[12px] font-bold h-10 mb-2 uppercase tracking-tight font-bold">${lang === 'ar' ? p.nameAr : p.nameEn}</h3><div class="flex flex-col justify-center mb-4"><span class="text-lg font-bold text-emerald-600">${p.price} EGP</span>${p.oldPrice ? `<span class="text-[10px] text-gray-300 line-through font-bold">${p.oldPrice} EGP</span>` : ''}</div><button onclick="addToCart(${p.id})" class="btn-order-master uppercase">${label}</button>`;
                grid.appendChild(card);
                tryImage(card.querySelector('.prod-img'), p.img);
            });
        }

        tryImage(document.querySelector('.logo-img'), 'logo');
        tryImage(document.querySelector('.hero-img'), 'vera set');

        function toggleTheme() { isDark = !isDark; document.body.classList.toggle('dark-mode'); document.getElementById('theme-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon'); lucide.createIcons(); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('open'); }
        function addToCart(id) { const p = products.find(it => it.id === id); cart.push(p); updateCartUI(); if(!document.body.querySelector('.cart-sidebar').classList.contains('open')) toggleCart(); }
        function removeFromCart(idx) { cart.splice(idx, 1); updateCartUI(); }
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const t = document.getElementById('cart-items'); t.innerHTML = ''; let ttl = 0;
            cart.forEach((i, idx) => { ttl += i.price; t.innerHTML += `<div class="flex items-center gap-4 bg-gray-50 dark:bg-black/20 p-4 rounded-2xl text-right font-bold text-[10px]"><div class="flex-1"><h4>${lang === 'ar' ? i.nameAr : i.nameEn}</h4><p>${it.price} EGP</p></div><button onclick="removeFromCart(${idx})"><i data-lucide="trash-2" class="w-4 h-4 text-gray-400"></i></button></div>`; });
            document.getElementById('cart-total').innerText = ttl + " EGP"; lucide.createIcons();
        }
        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            const h = document.getElementById('main-html'); h.dir = lang === 'ar' ? 'rtl' : 'ltr'; h.lang = lang;
            document.body.className = lang === 'ar' ? 'lang-ar text-right' : 'lang-en text-left';
            if (isDark) document.body.classList.add('dark-mode');
            document.getElementById('lang-btn').innerText = lang === 'ar' ? 'EN' : 'AR';
            document.getElementById('section-title').innerText = lang === 'ar' ? 'أقوى العروض الحصرية' : 'Exclusive Beauty Offers';

            renderProducts(); updateCartUI(); lucide.createIcons();
        }
        function openCheckout() { if(cart.length === 0) return alert("Empty!"); document.getElementById('checkoutModal').classList.remove('hidden'); }
        function closeCheckout() { document.getElementById('checkoutModal').classList.add('hidden'); }

        document.getElementById('orderForm').addEventListener('submit', function(e) {

            const nm = document.getElementById('custName').value, ph = document.getElementById('custPhone').value, ad = document.getElementById('custAddress').value;
            const its = cart.map(i => lang === 'ar' ? i.nameAr : i.nameEn).join(', ');
            const total = document.getElementById('cart-total').innerText;
            const msg = lang === 'ar' ? `*طلب جديد دكتور كير*%0A*المنتجات:* ${its}%0A*الإجمالي:* ${total}%0A---%0A*الاسم:* ${nm}%0A*الموبايل:* ${ph}%0A*العنوان:* ${ad}` : `*DR CARE ORDER*%0A*Items:* ${its}%0A*Total:* ${total}%0A---%0A*Name:* ${nm}%0A*Phone:* ${ph}%0A*Address:* ${ad}`;
            window.open(`https://wa.me/201091560043?text=${msg}`, '_blank');
            fetch('https://formspree.io/f/xvzjpvpw', { method: 'POST', body: JSON.stringify({nm, ph, ad, its, total}), headers: {'Content-Type': 'application/json'} });
